                        trigger.addEventListener('focus', preconnect, { once: true });
                        trigger.addEventListener('click', function () {
                            activatePlayer(container);
                        });
                    });
                })();
            </script>
            <script>
                (function () {
                    function stripIds(node) {
                        if (!node) return;
                        if (node.removeAttribute) {
                            node.removeAttribute('id');
                        }
                        if (node.querySelectorAll) {
                            node.querySelectorAll('[id]').forEach(function (el) {
                                el.removeAttribute('id');
                            });
                        }
                    }
                    function getGap(track) {
                        if (!track || !window.getComputedStyle) return 0;
                        var style = window.getComputedStyle(track);
                        var raw = style.columnGap || style.gap || '0';
                        var gap = parseFloat(raw);
                        return Number.isFinite(gap) ? gap : 0;
                    }
                    function setupSlider(slider) {
                        if (!slider) return;
                        var track = slider.querySelector('.fs-infinite-track');
                        if (!track) return;
                        track.querySelectorAll('[data-fs-infinite-clone="1"]').forEach(function (node) {
                            if (node.parentNode) {
                                node.parentNode.removeChild(node);
                            }
                        });
                        var base = track.querySelector('[data-fs-infinite-group]') || track.querySelector('.fs-infinite-group');
                        if (!base) return;
                        base.setAttribute('data-fs-infinite-group', '1');
                        var baseRect = base.getBoundingClientRect();
                        var containerRect = slider.getBoundingClientRect();
                        var baseWidth = baseRect.width;
                        var containerWidth = containerRect.width;
                        if (!baseWidth || !containerWidth) return;
                        var gap = getGap(track);
                        var step = baseWidth + gap;
                        var needed = Math.ceil((containerWidth + step) / step);
                        var total = Math.max(2, needed);
                        for (var i = 1; i < total; i++) {
                            var clone = base.cloneNode(true);
                            clone.setAttribute('aria-hidden', 'true');
                            clone.setAttribute('data-fs-infinite-clone', '1');
                            stripIds(clone);
                            track.appendChild(clone);
                        }
                        slider.style.setProperty('--fs-infinite-shift', step + 'px');
                    }
                    function run() {
                        var sliders = document.querySelectorAll('.fs-infinite-slider');
                        if (!sliders.length) return;
                        sliders.forEach(setupSlider);
                    }
                    function debounce(fn, wait) {
                        var t;
                        return function () {
                            clearTimeout(t);
                            t = setTimeout(fn, wait);
                        };
                    }
                    var rerun = debounce(run, 200);
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', function () {
                            run();
                            setTimeout(run, 200);
                        });
                    } else {
                        run();
                        setTimeout(run, 200);
                    }
                    window.addEventListener('resize', rerun);
                })();
            </script>
                    </body>
